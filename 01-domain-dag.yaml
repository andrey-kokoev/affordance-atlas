domain_design_dag:
  id: closed_loop_spatiotemporal_affordance_availability_resolver
  label: Closed-loop spatiotemporal affordance availability resolver
  purpose: >
    Resolve partial user constraints over whatness, whereness, and whenness
    into sourced real-world availability claims; convert insufficient coverage
    into acquisition work that expands the claim base.

  status_semantics:
    unanswered: No committed document answers this node yet.
    draft_answered: >
      A committed document gives a usable draft answer, but one or more upstream
      DAG dependencies remain unanswered. The answer is allowed as scaffold but
      must be revisited after blocking dependencies are answered.
    answered: >
      A committed document answers the node and all strict blocking dependencies
      are either answered or not required for this node's current maturity.

  dependency_semantics:
    strict_depends_on: >
      Nodes that should be answered first for the answer to be considered final.
    soft_depends_on: >
      Nodes that improve or constrain the answer but do not block a useful draft.

  node_types:
    - definition
    - ontology
    - schema
    - query_semantics
    - answer_semantics
    - coverage_semantics
    - acquisition
    - architecture
    - product_boundary
    - v0_scope
    - naming
    - formalization

